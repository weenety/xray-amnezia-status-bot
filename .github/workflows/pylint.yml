name: pylint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and lint deps
        run: |
          python -m pip install --upgrade pip
          pip install . pylint

      - name: Run pylint
        run: pylint --rcfile=.pylintrc $(git ls-files '*.py')

